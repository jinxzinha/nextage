async function cadastrar(){
  const usuario = cadUser.value.trim();
  const game_id = cadID.value.trim();
  const senha = cadSenha.value.trim();

  if(!usuario || !game_id || !senha){
    alert("Preencha usuário, ID e senha.");
    return;
  }

  const existe = await db
    .from("usuarios")
    .select("*")
    .eq("usuario", usuario);

  if(existe.data && existe.data.length > 0){
    alert("Esse usuário já existe.");
    return;
  }

  const { error } = await db.from("usuarios").insert({
    usuario,
    senha,
    game_id,
    cargo: "membro",
    aprovado: false
  });

  if(error){
    alert(error.message);
    return;
  }

  usuarioAtual = { usuario: "sistema" };
  await criarLog(`Solicitação de cadastro enviada: ${usuario} | ID: ${game_id}`);

  alert("Cadastro enviado! Aguarde aprovação do administrador.");

  cadID.value = "";
  cadSenha.value = "";

}

function podePostar(categoria){
  if(usuarioAtual.cargo === "admin") return true;
  if(categoria === "virtus" && usuarioAtual.cargo === "virtus") return true;
  return false;
}


function rodapeLinks(){
  return `
    <div class="social-icons">
      ${config.discord ? `<a href="${config.discord}" target="_blank" title="Discord">💬</a>` : ""}
      ${config.instagram ? `<a href="${config.instagram}" target="_blank" title="Instagram">📸</a>` : ""}
      ${config.youtube ? `<a href="${config.youtube}" target="_blank" title="Youtube">▶️</a>` : ""}
      ${config.tiktok ? `<a href="${config.tiktok}" target="_blank" title="TikTok">🎵</a>` : ""}
    </div>
  `;
}


function renderMidia(midia, tipo){
  if(!midia) return "";

  if(tipo && tipo.startsWith("video")){
    return `<video src="${midia}" controls></video>`;
  }

  return `<img src="${midia}">`;
}


function arquivoParaBase64(file){
  return new Promise((resolve) => {
    if(!file){
      resolve({ midia: null, tipo: null });
      return;
    }

    const reader = new FileReader();

    reader.onload = function(e){
      resolve({
        midia: e.target.result,
        tipo: file.type
      });
    };

    reader.readAsDataURL(file);
  });
}
async function renderPosts(categoria, titulo, mostrarCapa){
  const { data } = await db
    .from("posts")
    .select("*")
    .eq("categoria", categoria)
    .order("criado_em", { ascending: false });

  let html = `<h1>${titulo}</h1>`;

  if(mostrarCapa && config.capa){
    html += `
      <img src="${config.capa}" 
      style="width:100%;max-height:238px;object-fit:cover;border-radius:15px;margin-bottom:20px;">
    `;
  }

  if(podePostar(categoria)){
    html += `
      <div class="card">
        <h2>Nova postagem</h2>
        <textarea id="postTexto" placeholder="Texto da postagem"></textarea>
        <input id="postArquivo" type="file" accept="image/png,image/jpg,image/jpeg,image/gif,video/*">
        <button onclick="criarPost('${categoria}')">Publicar</button>
      </div>
    `;
  }

  if(!data || data.length === 0){
    html += `<p>Nenhuma postagem ainda.</p>`;
  }

  data.forEach(post => {
    html += `
      <div class="card post">
        <p>${post.texto || ""}</p>
        ${renderMidia(post.midia, post.tipo_midia)}
        ${podePostar(categoria) ? `
          <br><br>
          <button class="delete" onclick="excluirPost(${post.id})">Excluir</button>
        ` : ""}
      </div>
    `;
  });

  html += rodapeLinks();

  content.innerHTML = html;
}

async function renderRecrutamento(){
  const { data } = await db
    .from("recrutamentos")
    .select("*")
    .order("quantidade", { ascending: false });

  let html = `
    <h1>RECRUTAMENTO</h1>

    <div class="card">
      <h2>Registrar recrutamento</h2>
      <button onclick="registrarRecrutamento()">+ Registrar recrutamento</button>
    </div>

    <div class="card">
      <h2>Ranking</h2>
  `;

  if(!data || data.length === 0){
    html += `<p>Nenhum recrutamento registrado ainda.</p>`;
  }

  data.forEach((r, i) => {
    const cls = i === 0 ? "rank1" : i === 1 ? "rank2" : i === 2 ? "rank3" : "";
    const medal = i === 0 ? "👑" : i === 1 ? "🥈" : i === 2 ? "🥉" : "";

    html += `
      <p class="${cls}">
        ${medal} ${i + 1}º - ${r.usuario}: ${r.quantidade} recrutamento(s)
      </p>
    `;
  });

  html += `
    </div>
    ${rodapeLinks()}
  `;

  content.innerHTML = html;
}


async function registrarRecrutamento(){
  const busca = await db
    .from("recrutamentos")
    .select("*")
    .eq("usuario", usuarioAtual.usuario)
    .maybeSingle();

  if(busca.data){
    await db
      .from("recrutamentos")
      .update({ quantidade: busca.data.quantidade + 1 })
      .eq("usuario", usuarioAtual.usuario);
  }else{
    await db
      .from("recrutamentos")
      .insert({
        usuario: usuarioAtual.usuario,
        quantidade: 1
      });
  }

  await criarLog(`${usuarioAtual.usuario} registrou recrutamento`);
  renderRecrutamento();
}

    !resultado

  const { error } = await db.from("elite").insert({
    usuario: usuarioAtual.usuario,

}


async function participarSorteio(id){
  const { error } = await db.from("participantes_sorteio").insert({
    sorteio_id: id,
    usuario: usuarioAtual.usuario
  });

  if(error){
    alert("Você já está participando desse sorteio.");
    return;
  }

  await criarLog(`${usuarioAtual.usuario} participou do sorteio`);
  renderSorteio();
}


async function gerarSorteio(id){
  if(usuarioAtual.cargo !== "admin"){
    alert("Apenas o administrador pode gerar o sorteio.");
    return;
  }

  const participantes = await db
    .from("participantes_sorteio")
    .select("*")
    .eq("sorteio_id", id);

  const lista = participantes.data || [];

  if(lista.length === 0){
    alert("Não há participantes.");
    return;
  }

  const vencedor = lista[Math.floor(Math.random() * lista.length)].usuario;

  const { error } = await db
    .from("sorteios")
    .update({ vencedor })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Sorteio gerado. Vencedor: ${vencedor}`);
  renderSorteio();
}


async function excluirSorteio(id){
  if(!confirm("Excluir sorteio?")) return;

  await db
    .from("participantes_sorteio")
    .delete()
    .eq("sorteio_id", id);

  const { error } = await db
    .from("sorteios")
    .delete()
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog("Sorteio excluído");
  renderSorteio();
}
async function renderLogs(){
  if(usuarioAtual.cargo !== "admin"){
    content.innerHTML = "<h1>Acesso negado</h1>";
    return;
  }

  const { data } = await db
    .from("logs")
    .select("*")
    .order("criado_em", { ascending: false });

  let html = `
    <h1>LOGS</h1>

    <div class="card logs">
  `;

  if(!data || data.length === 0){
    html += `<p>Nenhum log ainda.</p>`;
  }

  data.forEach(log => {
    html += `
      <p>
        <b>${new Date(log.criado_em).toLocaleString("pt-BR")}</b>
        —
        ${log.usuario}: ${log.acao}
      </p>
    `;
  });

  html += `</div>`;

  content.innerHTML = html;
}


async function renderGerenciar(){
  if(usuarioAtual.cargo !== "admin"){
    content.innerHTML = "<h1>Acesso negado</h1>";
    return;
  }

  const pendentes = await db
    .from("usuarios")
    .select("*")
    .eq("aprovado", false)
    .order("criado_em", { ascending: false });

  const aprovados = await db
    .from("usuarios")
    .select("*")
    .eq("aprovado", true)
    .order("criado_em", { ascending: false });

  let html = `
    <h1>GERENCIAR</h1>

    <div class="card">
      <h2>Membros pendentes</h2>
  `;

  if(!pendentes.data || pendentes.data.length === 0){
    html += `<p>Nenhuma solicitação pendente.</p>`;
  }

  pendentes.data.forEach(u => {
    html += `
      <div class="card">
        <p><b>Usuário:</b> ${u.usuario}</p>
        <p><b>ID:</b> ${u.game_id}</p>

        <button onclick="aprovarUsuario('${u.id}', '${u.usuario}')">
          Aprovar
        </button>

        <button class="delete" onclick="excluirSolicitacao('${u.id}', '${u.usuario}')">
          🗑️
        </button>
      </div>
    `;
  });

  html += `
    </div>

    <div class="card">
      <h2>Membros aprovados</h2>
  `;

  aprovados.data.forEach(u => {
    html += `
      <p>
        <b>${u.usuario}</b>
        —
        ID: ${u.game_id}
        —
        ${u.cargo}
      </p>
    `;
  });

  html += `
    </div>

    <div class="card">
      <h2>LINKS</h2>

      <input id="linkDiscord" placeholder="Discord" value="${config.discord || ""}">
      <input id="linkInstagram" placeholder="Instagram" value="${config.instagram || ""}">
      <input id="linkYoutube" placeholder="Youtube" value="${config.youtube || ""}">
      <input id="linkTiktok" placeholder="TikTok" value="${config.tiktok || ""}">
      <input id="linkDiscordVirtus" placeholder="Discord VIRTUS RP" value="${config.discord_virtus || ""}">

      <button onclick="salvarLinks()">Salvar links</button>
    </div>

    <div class="card">
      <h2>Avatar / Capa / Fundo</h2>

      <label>Avatar / Logo</label>
      <input type="file" id="avatarFile" accept="image/png,image/jpg,image/jpeg,image/gif">

      <label>Capa 1672x238</label>
      <input type="file" id="capaFile" accept="image/png,image/jpg,image/jpeg,image/gif">

      <label>Plano de fundo</label>
      <input type="file" id="fundoFile" accept="image/png,image/jpg,image/jpeg,image/gif">

      <button onclick="salvarImagens()">Salvar imagens</button>
    </div>
  `;

  content.innerHTML = html;
}


async function aprovarUsuario(id, usuario){
  const { error } = await db
    .from("usuarios")
    .update({ aprovado: true })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Cadastro aprovado: ${usuario}`);
  renderGerenciar();
}


async function excluirSolicitacao(id, usuario){
  if(!confirm("Cancelar e excluir essa solicitação de cadastro?")) return;

  const { error } = await db
    .from("usuarios")
    .delete()
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Solicitação de cadastro excluída: ${usuario}`);
  renderGerenciar();
}


async function salvarLinks(){
  const { error } = await db
    .from("configuracoes")
    .update({
  discord: linkDiscord.value.trim(),
  discord_virtus: linkDiscordVirtus.value.trim(),
  instagram: linkInstagram.value.trim(),
  youtube: linkYoutube.value.trim(),
  tiktok: linkTiktok.value.trim()
})
    .eq("id", 1);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog("Links atualizados");
  await carregarConfig();

  alert("Links salvos!");
  renderGerenciar();
}


async function salvarImagens(){
  const avatar = avatarFile.files[0] ? await arquivoParaBase64(avatarFile.files[0]) : null;
  const capa = capaFile.files[0] ? await arquivoParaBase64(capaFile.files[0]) : null;
  const fundo = fundoFile.files[0] ? await arquivoParaBase64(fundoFile.files[0]) : null;

  const atualizacao = {};

  if(avatar) atualizacao.avatar = avatar.midia;
  if(capa) atualizacao.capa = capa.midia;
  if(fundo) atualizacao.fundo = fundo.midia;

  if(Object.keys(atualizacao).length === 0){
    alert("Escolha pelo menos uma imagem.");
    return;
  }

  const { error } = await db
    .from("configuracoes")
    .update(atualizacao)
    .eq("id", 1);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog("Imagens do site atualizadas");
  await carregarConfig();

  alert("Imagens salvas!");
  renderGerenciar();
}


async function iniciar(){
  await carregarConfig();
}


iniciar();

</script>
